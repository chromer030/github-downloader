name: Download from Commit & Save to Repo

on:
  push:
    branches:
      - "**"

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2 and zip
        run: sudo apt-get install -y aria2 zip

      - name: Extract URLs and download files
        run: |
          set -euo pipefail

          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            URL_LINE=$(echo "$MSG" | grep -oP 'download-zip:\s*\K.*')
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            URL_LINE=$(echo "$MSG" | grep -oP 'download:\s*\K.*')
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi

          echo "Mode: $MODE"
          mkdir -p downloads tmp_downloads

          # FIX: Use readarray to handle URLs with special chars safely
          readarray -t URLS <<< "$(echo "$URL_LINE" | tr ' ' '\n' | grep -v '^$')"

          for URL in "${URLS[@]}"; do
            echo "⬇️ Downloading: $URL"
            aria2c \
              --split=4 \
              --max-connection-per-server=4 \
              --min-split-size=20M \
              --max-tries=5 \
              --retry-wait=10 \
              --dir="tmp_downloads" \
              "$URL" || { echo "❌ Failed to download: $URL"; exit 1; }
          done

          # FIX: Build zip only from actual downloaded files, not the archive itself
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S).zip"
            # Collect files before creating archive
            mapfile -t DL_FILES < <(find tmp_downloads -maxdepth 1 -type f)
            if [ ${#DL_FILES[@]} -eq 0 ]; then
              echo "❌ No files downloaded"
              exit 1
            fi
            zip -j "tmp_downloads/$ARCHIVE_NAME" "${DL_FILES[@]}"
            # Remove originals, keep only the archive
            for F in "${DL_FILES[@]}"; do rm -f "$F"; done
          fi

          LIMIT=$((90 * 1024 * 1024))

          # FIX: nullglob-safe loop
          shopt -s nullglob
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting..."
              # FIX: use --out so source file is not touched; output goes to downloads/
              zip -s 90m "downloads/${BASENAME}.zip" --out "downloads/${BASENAME}.zip" "$FILE"
              PART_COUNT=$(ls downloads/${BASENAME}* 2>/dev/null | wc -l)
              echo "✅ Split into $PART_COUNT parts"
            else
              cp "$FILE" "downloads/$BASENAME"
              echo "✅ Copied: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/

          # FIX: only push if there's actually something new
          if git diff --cached --quiet; then
            echo "⚠️ Nothing to commit — download may have already existed"
            exit 0
          fi

          git commit -m "Add downloaded files [skip ci]"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin "HEAD:$BRANCH"
